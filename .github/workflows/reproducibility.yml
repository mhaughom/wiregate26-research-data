name: Reproducibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - name: Install locked dependencies
        run: python -m pip install -r requirements-lock.txt
      - name: Verify published data
        run: python scripts/verify_dataset.py
      - name: Reproduce incident analysis
        run: |
          python scripts/analyze_incident.py
          python scripts/compare_incident_analysis.py
      - name: Reproduce kick models
        run: |
          python scripts/generate_kick_models.py
          python scripts/compare_model_outputs.py
      - name: Verify working tree is unchanged
        run: git diff --exit-code
